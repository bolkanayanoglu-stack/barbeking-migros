<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>En Yakın Migros Bul</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      overflow: hidden;
      width: 100%;
      height: auto;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: transparent;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 12px 8px;
    }

    .widget-container {
      width: 100%;
      max-width: 480px;
      text-align: center;
    }

    /* ── ANA BUTON ── */
    .find-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #111111;
      color: #FFB347;
      border: 1.5px solid rgba(255,179,71,0.3);
      border-radius: 50px;
      padding: 16px 28px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.3px;
      cursor: pointer;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      position: relative;
      overflow: hidden;
      white-space: nowrap;
      max-width: 100%;
    }

    .find-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,179,71,0.08) 0%, transparent 60%);
      border-radius: inherit;
    }

    .find-btn:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
      border-color: rgba(255,179,71,0.6);
    }

    .find-btn:active {
      transform: translateY(0) scale(0.98);
    }

    .find-btn:disabled {
      background: #2a2a2a;
      color: #666;
      border-color: rgba(255,255,255,0.1);
      box-shadow: none;
      cursor: not-allowed;
      transform: none;
    }

    .btn-icon {
      font-size: 20px;
      animation: pulse-icon 2s infinite;
    }

    @keyframes pulse-icon {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    /* ── SPINNER ── */
    .spinner {
      display: none;
      width: 22px;
      height: 22px;
      border: 3px solid rgba(255,179,71,0.3);
      border-top-color: #FFB347;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── SONUÇ KARTI ── */
    .result-card {
      display: none;
      margin-top: 20px;
      background: #1a0a00;
      border: none;
      border-top: 3px solid #E8820C;
      border-radius: 20px;
      padding: 24px 20px 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      text-align: left;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-badge {
      display: inline-block;
      background: #000;
      color: #E8820C;
      border: none;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-radius: 20px;
      padding: 4px 12px;
      margin-bottom: 12px;
    }

    .result-store-name {
      font-size: 20px;
      font-weight: 900;
      color: #ffffff;
      line-height: 1.2;
      margin-bottom: 6px;
    }

    .result-address {
      font-size: 13px;
      color: #d4b896;
      line-height: 1.5;
      margin-bottom: 4px;
    }

    .result-distance {
      font-size: 13px;
      font-weight: 600;
      color: #E8820C;
      margin-bottom: 16px;
    }

    /* ── NAVİGASYON BUTONLARI ── */
    .nav-buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 20px;
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      border: none;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .nav-btn:hover {
      transform: translateY(-1px);
    }

    .nav-btn-google {
      background: #4285F4;
      color: white;
      box-shadow: 0 4px 15px rgba(66, 133, 244, 0.35);
    }

    .nav-btn-yandex {
      background: #FC3F1D;
      color: white;
      box-shadow: 0 4px 15px rgba(252, 63, 29, 0.35);
    }

    .nav-btn-apple {
      background: #000;
      color: white;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.25);
    }

    /* ── HATA ── */
    .error-msg {
      display: none;
      margin-top: 14px;
      background: #fff3f3;
      border: 1px solid #ffcdd2;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 13px;
      color: #c62828;
      line-height: 1.5;
    }


    /* ── MOBİL UYUM ── */
    @media (max-width: 400px) {
      .find-btn {
        font-size: 13px;
        padding: 14px 20px;
        gap: 6px;
      }
      .result-store-name { font-size: 17px; }
      .nav-btn { font-size: 13px; padding: 10px 14px; }
    }
  </style>
</head>

  // ── HAVERSINE UZAKLIK HESABI ──────────────────────────────────────────────
  function haversine(lat1, lng1, lat2, lng2) {
    const R = 6371; // km
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 +
              Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
              Math.sin(dLng/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  // ── ANA FONKSİYON ────────────────────────────────────────────────
  function findNearest() {
    const btn     = document.getElementById('findBtn');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btnText');
    const errorEl = document.getElementById('errorMsg');
    const card    = document.getElementById('resultCard');

    // Reset
    errorEl.style.display = 'none';
    card.style.display    = 'none';

    // Loading state
    btn.disabled = true;
    spinner.style.display = 'block';
    btnText.textContent   = 'Konum alınıyor…';

    // Wix Velo'dan konum iste
    window.parent.postMessage('getLocation', '*');

    // Zaman aşımı
    locationTimeout = setTimeout(function() {
      btn.disabled = false;
      spinner.style.display = 'none';
      btnText.textContent = '📍 Size En Yakın Barbeking Noktası';
      showError('Konum alınamadı. Lütfen tarayıcı konum iznini kontrol edip tekrar deneyin.');
    }, 12000);
  }

  var locationTimeout;

  // ── VELO'DAN KONUM AL ────────────────────────────────────────────
  window.addEventListener('message', function(e) {
    var data = e.data;
    if (!data || data.type === 'setHeight') return;

    var btn     = document.getElementById('findBtn');
    var spinner = document.getElementById('spinner');
    var btnText = document.getElementById('btnText');

    clearTimeout(locationTimeout);
    btn.disabled = false;
    spinner.style.display = 'none';

    if (data.error) {
      btnText.textContent = '📍 Size En Yakın Barbeking Noktası';
      showError('Konum izni reddedildi. Lütfen tarayıcı ayarlarından konum erişimine izin verin.');
      return;
    }

    if (data.lat && data.lng) {
      var nearest = null;
      var minDist = Infinity;
      STORES.forEach(function(store) {
        var d = haversine(data.lat, data.lng, store.lat, store.lng);
        if (d < minDist) { minDist = d; nearest = store; }
      });
      showResult(nearest, minDist, data.lat, data.lng);
      btnText.textContent = '📍 Tekrar Ara';
    }
  });

  function showResult(store, distKm, userLat, userLng) {
    document.getElementById('storeName').textContent    = store.name;
    document.getElementById('storeAddress').textContent = store.address;
    document.getElementById('storeDistance').textContent =
      '📏 Size olan uzaklık: ' + (distKm < 1
        ? Math.round(distKm * 1000) + ' m'
        : distKm.toFixed(1) + ' km');

    // Harita URL'lerini Velo'ya gönder
    window.parent.postMessage({
      action: 'mapUrls',
      google: 'https://www.google.com/maps/dir/?api=1&destination=' + store.lat + ',' + store.lng + '&travelmode=driving',
      yandex: 'https://yandex.com/maps/?rtext=' + userLat + ',' + userLng + '~' + store.lat + ',' + store.lng + '&rtt=auto',
      apple:  'https://maps.apple.com/?daddr=' + store.lat + ',' + store.lng + '&dirflg=d'
    }, '*');

    document.getElementById('resultCard').style.display = 'block';
    resizeFrame();
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent    = '⚠️ ' + msg;
    el.style.display  = 'block';
    resizeFrame();
  }

  // ── WİX IFRAME OTOMATİK YÜKSEKLİK ──────────────────────────────────────
  function resizeFrame() {
    const h = document.documentElement.scrollHeight + 5;
    if (window.Wix) {
      window.Wix.setHeight(h);
    } else {
      window.parent.postMessage({ type: 'setHeight', height: h }, '*');
    }
  }

  window.addEventListener('load', resizeFrame);
  setTimeout(resizeFrame, 300);
  setTimeout(resizeFrame, 800);
</script>
